<!DOCTYPE html>
<head>
    <title>All students</title>
</head>
<body>

<h1>All students</h1>
<a href="/admin/dashboard">Back to Dashboard</a>
<hr>
<table border="1">
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>CGPA</th>
</tr>
{% for student in students %}
<tr>
<td>{{ student.name }}</td>
<td>{{ student.roll_no }}</td>
<td>{{ student.department }}</td>
<td>{{ student.cgpa }}</td>

</tr>
{% endfor %}
</table>
</body>
</html>
