<!DOCTYPE html>
<head>
    <title>Drive Applications</title>
</head>
<body>

<h1>Applications for Drive</h1>
<a href="/admin/dashboard">Back to Dashboard</a>
<hr>
<table border="1">
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>CGPA</th>
<th>Status</th>
</tr>
{% for app, student in applications %}
<tr>
<td>{{ student.name }}</td>
<td>{{ student.roll_no }}</td>
<td>{{ student.department }}</td>
<td>{{ student.cgpa }}</td>
<td>{{ app.status or "Applied" }}</td>

</tr>
{% endfor %}
</table>
</body>
</html>
